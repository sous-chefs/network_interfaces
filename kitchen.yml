---
driver:
  name: vagrant

provisioner:
  name: chef_infra
  deprecations_as_errors: true
  enforce_idempotency: true
  multiple_converge: 2
  chef_license: accept-no-persist

verifier:
  name: inspec

x-run_lists:
  default: &default_run_list
    - recipe[test::default]

x-verifiers:
  default: &default_verifier
    inspec_tests:
      - path: test/integration/default

platforms:
  - name: debian-12
  - name: debian-13
  - name: ubuntu-22.04
  - name: ubuntu-24.04

suites:
  - name: default
    run_list: *default_run_list
    verifier: *default_verifier
